name: ebook_library
description: Digital Ebook Library — Flutter frontend for the Rails ebook API.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  file_picker: ^6.2.0
  path_provider: ^2.1.2
  open_filex: ^4.4.0
  syncfusion_flutter_pdfviewer: ^25.1.35
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
